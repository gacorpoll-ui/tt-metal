name: "[internal] profiler tests impl"

on:
  workflow_call:
    inputs:
      build-artifact-name:
        required: true
        type: string
      wheel-artifact-name:
        required: true
        type: string
      docker-image:
        required: true
        type: string
      topology:
        required: true
        type: string
      test-script:
        required: true
        type: string
      extra-tag:
        required: false
        type: string
        default: "in-service"
      sku-tag:
        required: false
        type: string
        default: ""
        description: "Optional extra runner label (e.g. 'pipeline-perf' for runners that host /mnt/MLPerf model weights)."

jobs:
  profiler-tests:
    strategy:
      fail-fast: false
    name: "profiler tests"
    runs-on: ${{ inputs.sku-tag != '' && fromJSON(format('["arch-wormhole_b0","{0}","{1}","{2}"]', inputs.sku-tag, inputs.topology, inputs.extra-tag)) || fromJSON(format('["arch-wormhole_b0","{0}","{1}"]', inputs.topology, inputs.extra-tag)) }}
    container:
      image: ${{ inputs.docker-image }}
      env:
        TT_METAL_HOME: /work
        PYTHONPATH: /work
        LD_LIBRARY_PATH: /work/build/lib
        ARCH_NAME: wormhole_b0
        LOGURU_LEVEL: INFO
        PROFILER_SCRIPTS_ROOT: /work/tt_metal/tools/profiler
        PROFILER_TEST_SCRIPTS_ROOT: /work/tests/tt_metal/tools/profiler
        PROFILER_ARTIFACTS_DIR: /work/generated/profiler
        PROFILER_OUTPUT_DIR: /work/generated/profiler/reports
        DONT_USE_VIRTUAL_ENVIRONMENT: 1
      volumes:
        - ${{ github.workspace }}/docker-job:/work # Subdir to workaround https://github.com/actions/runner/issues/691
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /mnt/MLPerf:/mnt/MLPerf:ro
      options: "--device /dev/tenstorrent"
    defaults:
      run:
        shell: bash
        working-directory: /work # https://github.com/actions/runner/issues/878
    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: docker-job
      - name: ⬇️  Setup Job
        uses: ./docker-job/.github/actions/setup-job
        timeout-minutes: 10
        with:
          build-artifact-name: ${{ inputs.build-artifact-name }}
          wheel-artifact-name: ${{ inputs.wheel-artifact-name }}
      - name: Run profiler regression tests
        timeout-minutes: 60
        run: |
          ${{ inputs.test-script }}
      - uses: tenstorrent/tt-metal/.github/actions/upload-artifact-with-job-uuid@main
        timeout-minutes: 10
        if: ${{ !cancelled() }}
        with:
          prefix: "test_reports_"
      - uses: tenstorrent/tt-metal/.github/actions/cleanup@main
        if: always()
